# https://typeof.net/Iosevka/customizer
[buildPlans.IosevkaCustomTerm]
family = "Iosevka Custom Term"
spacing = "term"
serifs = "slab"
noCvSs = true
exportGlyphNames = false

[buildPlans.IosevkaCustomTerm.variants.design]
zero = "dotted"
capital-q = "crossing"
capital-w = "straight-serifed"
h = "straight-top-left-serifed"
x = "curly-serifless"
paren = "large-contour"
brace = "curly"

[buildPlans.IosevkaCustomTerm.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.IosevkaCustomTerm.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.IosevkaCustomTerm.widths.Condensed]
shape = 500
menu = 3
css = "condensed"

[buildPlans.IosevkaCustomTerm.widths.Normal]
shape = 600
menu = 5
css = "normal"

[buildPlans.IosevkaCustomTerm.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.IosevkaCustomTerm.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"

